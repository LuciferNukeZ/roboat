name: Bug Report
description: Something isn't working correctly
title: "[Bug] "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill in as much detail as possible so we can reproduce it.

  - type: input
    id: version
    attributes:
      label: roboat version
      description: Run `python -c "import roboat; print(roboat.__version__)"`
      placeholder: "2.1.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Run `python --version`
      placeholder: "3.11.4"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Code to reproduce
      description: Minimal code that reproduces the issue.
      render: python
      placeholder: |
        from roboat import RoboatClient
        client = RoboatClient()
        # ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Full traceback
      description: Paste the complete error output.
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am using the latest version of roboat
          required: true
