name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build wheel

      - name: Build distributions
        run: python -m build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: roboat v${{ steps.version.outputs.VERSION }}
          body: |
            ## roboat v${{ steps.version.outputs.VERSION }}

            See [CHANGELOG.md](https://github.com/Addi9000/roboat/blob/main/CHANGELOG.md) for full details.

            ### Install
            ```bash
            pip install roboat==${{ steps.version.outputs.VERSION }}
            ```
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: false
